name: aman_sales_app
description: "Aman Sales App - منصة تسجيل التجار"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.0.0
  provider: ^6.0.0
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  url_launcher: ^6.2.0
  mixpanel_flutter: ^2.6.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  patrol: ^4.5.0
  flutter_launcher_icons: ^0.14.1

patrol:
  app_name: Aman Sales App
  android:
    package_name: com.aman.aman_sales_app

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/branding/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/
