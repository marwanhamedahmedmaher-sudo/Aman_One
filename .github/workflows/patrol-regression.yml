name: Patrol Regression

# Runs the Patrol golden-path integration test on a headless Android
# emulator against prod Supabase. Every test run creates exactly one
# merchant row tagged with `PATROL-TEST-<timestamp>-<random>`; the test
# cleans up after itself via the rep's JWT (RLS-scoped, no service-role
# in CI). Pre-flight gate before the Build Pilot APK workflow — open a
# PR that touches the app and this runs automatically.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'patrol_test/**'
      - 'android/**'
      - '.github/workflows/patrol-regression.yml'
  # Temporary push trigger on the introducing branch so the workflow can
  # validate itself before it lands on `main` (GitHub only evaluates
  # `pull_request` triggers from workflows that already exist on the base
  # branch, so the PR that introduces this file cannot trigger itself).
  # Remove once merged to `main`.
  push:
    branches: [ci/split-per-abi]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'patrol_test/**'
      - 'android/**'
      - '.github/workflows/patrol-regression.yml'

concurrency:
  # Serialize runs on the same ref — the test hits shared prod Supabase,
  # parallel runs raise the collision risk on the dedup constraints even
  # with the random run tag. One run at a time per ref.
  group: patrol-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patrol:
    name: Golden-path regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install Patrol CLI
        # Version-pinned so a breaking release of patrol_cli doesn't silently
        # fail the pipeline. Bump in lockstep with the `patrol` dev dep —
        # patrol_cli versioning is independent of the patrol library but the
        # major number must match at runtime (both on 4.x as of 2026-04).
        run: dart pub global activate patrol_cli 4.3.1

      - name: Enable KVM for Android emulator
        # Hardware accel shaves emulator boot from ~minutes to ~30s. Without
        # this, the emulator-runner action falls back to software rendering
        # and test runs easily blow through 45min.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: AVD cache
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api33-google_apis-x86_64-v1

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          # Omit `-no-snapshot` here — it disables BOTH save and load, which
          # would render the AVD cache useless. The emulator-runner action
          # persists AVD state after shutdown so the test step below can
          # boot from the warm snapshot in ~15s instead of ~2min.
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot generated."

      - name: Run Patrol golden-path test
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PATROL_TEST_PHONE: ${{ secrets.PATROL_TEST_PHONE }}
          PATROL_TEST_PASSWORD: ${{ secrets.PATROL_TEST_PASSWORD }}
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            : "${SUPABASE_URL:?SUPABASE_URL secret is required}"
            : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY secret is required}"
            : "${PATROL_TEST_PHONE:?PATROL_TEST_PHONE secret is required — phone of the durable Patrol test rep (E.164 or 01XXXXXXXXX)}"
            : "${PATROL_TEST_PASSWORD:?PATROL_TEST_PASSWORD secret is required — password of the durable Patrol test rep (post-rotation)}"

            # Wait for the emulator to fully boot before handing off to Patrol.
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'

            # Sanity-check secret expansion at this shell scope. We only
            # print presence + length so CI logs never show the value. If
            # any of these read "len=0", the GH secret is missing/empty —
            # no amount of --dart-define jiggery-pokery will help.
            echo "SUPABASE_URL len=${#SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY len=${#SUPABASE_ANON_KEY}"
            echo "PATROL_TEST_PHONE len=${#PATROL_TEST_PHONE}"
            echo "PATROL_TEST_PASSWORD len=${#PATROL_TEST_PASSWORD}"

            # CRITICAL: reactivecircus/android-emulator-runner runs each
            # line of this script via its own `sh -c` invocation. Shell
            # state (variables, $!, traps) does NOT persist across lines,
            # and backslash line continuations cause syntax errors. Every
            # command below must be self-contained on one line.

            # Start logcat stream (background; survives the sh -c that
            # launches it via `&`). sed -u flushes each line to CI stdout
            # immediately. Emulator teardown kills logcat — no trap needed.
            adb logcat -c
            adb logcat -v time flutter:V AndroidRuntime:E ActivityManager:W DartVM:V '*:S' 2>&1 | sed -u 's/^/LOGCAT| /' &

            # Write dart-defines as JSON (patrol_cli 4.x drops --dart-define
            # flags on the test-bundle compile but honors --dart-define-from-file).
            jq -n -c --arg supa_url "$SUPABASE_URL" --arg supa_key "$SUPABASE_ANON_KEY" --arg phone "$PATROL_TEST_PHONE" --arg password "$PATROL_TEST_PASSWORD" '{SUPABASE_URL:$supa_url, SUPABASE_ANON_KEY:$supa_key, PATROL_TEST_PHONE:$phone, PATROL_TEST_PASSWORD:$password}' > /tmp/patrol-defines.json

            # Sanity-check the JSON file (structure only; values are secret).
            echo "defines file bytes=$(wc -c < /tmp/patrol-defines.json) keys=$(jq -r 'keys | length' /tmp/patrol-defines.json)"

            # Bound patrol_cli with `timeout 10m` so a silent hang fails
            # fast instead of burning the full 45-min job budget. No
            # --foreground — we WANT a new process group so SIGTERM
            # reaches Gradle/JVM/adb descendants.
            timeout --signal=TERM --kill-after=30s 10m patrol test --verbose --dart-define-from-file=/tmp/patrol-defines.json

      - name: Upload Patrol artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-failure-logs
          # Whitelist-only: upload ONLY text-ish diagnostics and screenshots.
          # PATROL_TEST_PASSWORD is embedded in the compiled test APK as a
          # Dart constant (via `const String.fromEnvironment`) — recoverable
          # with `strings <apk>`. Using a blacklist of `.apk/.aab/.so/...`
          # would leak via any extension we forget (.apks, .ap_, gzipped
          # splits, native libs). Whitelist means no binary ever ships.
          path: |
            build/app/reports/androidTests/**/*.html
            build/app/reports/androidTests/**/*.xml
            build/app/reports/androidTests/**/*.txt
            build/patrol/**/*.log
            build/patrol/**/*.txt
            build/patrol/**/*.xml
            build/patrol/**/*.json
            build/patrol/**/*.png
            build/patrol/**/*.jpg
          if-no-files-found: ignore
          retention-days: 14
