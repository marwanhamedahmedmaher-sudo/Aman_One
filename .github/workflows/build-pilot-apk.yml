name: Build Pilot APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'APK filename suffix (e.g. 1.0.0-pilot)'
        required: true
        default: '1.0.0-pilot'

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/aman-release.jks
          echo "Keystore size: $(stat -c%s android/app/aman-release.jks) bytes"

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_FILE_PATH: ${{ github.workspace }}/android/app/aman-release.jks
        run: |
          {
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n'   "$KEY_PASSWORD"
            printf 'keyAlias=%s\n'      "$KEY_ALIAS"
            printf 'storeFile=%s\n'     "$STORE_FILE_PATH"
          } > android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Verify APK signature
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using: $APKSIGNER"
          "$APKSIGNER" verify --print-certs build/app/outputs/flutter-apk/app-release.apk

      - name: Secret scan (decompile + grep)
        run: |
          sudo apt-get install -y apktool
          apktool d build/app/outputs/flutter-apk/app-release.apk -o decompiled/ -f
          echo "=== Scanning for forbidden secrets ==="
          if grep -rniE "service_role|supabase_service_role|SERVICE_ROLE_KEY" decompiled/; then
            echo "::error::service_role key detected in APK — BLOCKING"
            exit 1
          fi
          JWT_COUNT=$(grep -rcE "eyJ[A-Za-z0-9_-]{20,}" decompiled/ 2>/dev/null \
                      | awk -F: '{s+=$2} END {print s+0}')
          echo "Scan clean. JWT-like tokens found in APK: $JWT_COUNT (expected: anon key occurrences only)"

      - name: Sanitize version and rename APK
        run: |
          VERSION_SAFE=$(printf '%s' "${{ inputs.version_name }}" | tr -cd '[:alnum:]._-')
          if [ -z "$VERSION_SAFE" ]; then
            echo "::error::version_name contained no allowed characters ([A-Za-z0-9._-])"
            exit 1
          fi
          cp build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/aman-v${VERSION_SAFE}.apk"
          ls -lh build/app/outputs/flutter-apk/
          echo "VERSION_SAFE=$VERSION_SAFE" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aman-pilot-apk-v${{ env.VERSION_SAFE }}
          path: build/app/outputs/flutter-apk/aman-v${{ env.VERSION_SAFE }}.apk
          retention-days: 30
          if-no-files-found: error
