name: Build Pilot APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'APK filename suffix (e.g. 1.0.0-pilot)'
        required: true
        default: '1.0.0-pilot'

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/aman-release.jks
          echo "Keystore size: $(stat -c%s android/app/aman-release.jks) bytes"

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=${{ github.workspace }}/android/app/aman-release.jks
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

      - name: Verify APK signature
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          echo "Using: $APKSIGNER"
          $APKSIGNER verify --print-certs build/app/outputs/flutter-apk/app-release.apk

      - name: Secret scan (decompile + grep)
        run: |
          sudo apt-get install -y apktool
          apktool d build/app/outputs/flutter-apk/app-release.apk -o decompiled/ -f
          echo "=== Scanning for forbidden secrets ==="
          if grep -rniE "service_role|supabase_service_role|SERVICE_ROLE_KEY" decompiled/; then
            echo "::error::service_role key detected in APK — BLOCKING"
            exit 1
          fi
          echo "Scan clean — only anon key present (verified below):"
          grep -rnE "eyJ[A-Za-z0-9_-]{20,}" decompiled/ | head -5 || true

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/aman-v${{ inputs.version_name }}.apk
          ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aman-pilot-apk-v${{ inputs.version_name }}
          path: build/app/outputs/flutter-apk/aman-v${{ inputs.version_name }}.apk
          retention-days: 30
          if-no-files-found: error
