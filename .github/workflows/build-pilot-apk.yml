name: Build Pilot APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'APK filename suffix (e.g. 1.0.0-pilot)'
        required: true
        default: '1.0.0-pilot'
  # TEMPORARY: auto-build on push to the field-tasks branch so the pilot APK
  # can be produced without manual workflow_dispatch. Revert once validated.
  push:
    branches:
      - claude/hopeful-euler-9gs6od

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Single source of truth for the ABIs built. Every loop below reads $ABIS
      # so verify / scan / rename / upload cannot silently diverge.
      ABIS: armeabi-v7a arm64-v8a x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/aman-release.jks
          echo "Keystore size: $(stat -c%s android/app/aman-release.jks) bytes"

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_FILE_PATH: ${{ github.workspace }}/android/app/aman-release.jks
        run: |
          {
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n'   "$KEY_PASSWORD"
            printf 'keyAlias=%s\n'      "$KEY_ALIAS"
            printf 'storeFile=%s\n'     "$STORE_FILE_PATH"
          } > android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build release APKs (split per ABI)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        run: |
          : "${SUPABASE_URL:?SUPABASE_URL secret is required — set it in repo Settings → Secrets and variables → Actions}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY secret is required — set it in repo Settings → Secrets and variables → Actions}"
          # MIXPANEL_TOKEN is optional — if empty, Analytics routes to NoopSink.
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=MIXPANEL_TOKEN="$MIXPANEL_TOKEN"
          ls -lh build/app/outputs/flutter-apk/

      - name: Verify APK signatures
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using: $APKSIGNER"
          for abi in $ABIS; do
            APK="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ ! -f "$APK" ]; then
              echo "::error::expected per-ABI APK not found: $APK"
              exit 1
            fi
            echo "=== Verifying $abi ==="
            "$APKSIGNER" verify --print-certs "$APK"
          done

      - name: Secret scan (decompile + grep)
        run: |
          sudo apt-get install -y apktool
          # Forbidden-secret patterns. None of these should ever appear in a
          # shipped APK; any match hard-blocks the pilot.
          #   - service_role / SERVICE_ROLE_KEY : Supabase admin JWT
          #   - storePassword / keyPassword     : keystore creds from key.properties
          #   - \b[23][0-9]{13}\b               : 14-digit Egyptian National ID
          #                                       (starts with century code 2 or 3)
          FORBIDDEN='service_role|supabase_service_role|SERVICE_ROLE_KEY|storePassword|keyPassword|KEYSTORE_PASSWORD|KEY_PASSWORD|\b[23][0-9]{13}\b'
          for abi in $ABIS; do
            APK="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            DEST="decompiled-${abi}"
            echo "=== Decompiling $abi ==="
            apktool d "$APK" -o "$DEST" -f
            echo "=== Scanning $abi for forbidden secrets ==="
            # -l emits filenames only; matching content is never echoed to the log.
            if MATCHES=$(grep -rlE "$FORBIDDEN" "$DEST"); then
              echo "::error::forbidden secret detected in $abi APK — BLOCKING (service_role / keystore password / National ID pattern)"
              echo "Matching files (content suppressed to avoid leaking secrets):"
              printf '%s\n' "$MATCHES"
              exit 1
            fi
            JWT_COUNT=$(grep -rcE "eyJ[A-Za-z0-9_-]{20,}" "$DEST" 2>/dev/null \
                        | awk -F: '{s+=$2} END {print s+0}')
            echo "$abi scan clean. JWT-like tokens found: $JWT_COUNT (expected: anon key occurrences only)"
          done

      - name: Security scan (MobSF)
        # Decompiles the arm64-v8a APK (the variant pilot reps install) and runs
        # MobSF's static analyzer. Hard-fails on HIGH findings unless the finding
        # title matches the allowlist below (for well-known Flutter-framework
        # false positives and pilot-accepted risks).
        #
        # Scope: one ABI, not all three. Native libs differ by arch but the
        # Java/Kotlin/manifest surface — which is what MobSF actually scans — is
        # identical. Scanning one arch catches 99% of findings at 1/3 the cost.
        #
        # API key is generated ephemerally per run and stays on the runner. No
        # secret required.
        run: |
          # Allowlist (bash array, one title substring per entry). Each entry
          # must be a confirmed false positive or an explicit pilot-accepted
          # risk. PR reviewers should push back on unjustified additions —
          # every new line here weakens the security gate.
          ALLOWLIST=(
            # Flutter Android default: android:allowBackup=true. Lead-capture
            # pilot only; sensitive data (NIDs) are Vault-encrypted server-side
            # and never persisted to unprotected client storage. Revisit at P2
            # before broader rollout.
            "App data can be Backed up"
            "Application Data can be Backed up"
            # Debug certificate in NONE-release configs — MobSF occasionally
            # misreads Flutter's Play Signing cert chain. Our APKs are verified
            # separately by `apksigner verify` earlier in this job.
            "Application signed with debug certificate"
            # minSdk=24 (Android 7.0) is Flutter's current default floor, not an
            # app-specific choice. Pilot reps are on modern tablets; lowering the
            # supported-version risk by raising minSdk would cut device coverage
            # for no pilot benefit. Pilot-accepted; revisit at P2 hardening.
            "App can be installed on a vulnerable unpatched Android version"
            # AES/CBC + PKCS5/PKCS7 padding is reported in a TRANSITIVE dependency,
            # not app code — the Aman app performs no client-side crypto (NIDs are
            # Vault-encrypted server-side). Framework-level finding; pilot-accepted
            # pending an upstream dependency audit at P2.
            "uses the encryption mode CBC with PKCS5/PKCS7 padding"
          )

          APK="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::MobSF target APK not found: $APK"
            exit 1
          fi

          MOBSF_API_KEY=$(openssl rand -hex 32)

          # Tracking :latest intentionally during pilot so we get upstream
          # fixes without manual bumps. The `jq -e '.appsec.high'` structure
          # guard below catches report-shape drift. After the first green run
          # on a known-good MobSF version, pin to that tag for reproducibility
          # (format: opensecurity/mobile-security-framework-mobsf:v4.x.y).
          MOBSF_IMAGE="opensecurity/mobile-security-framework-mobsf:latest"

          echo "=== Pulling $MOBSF_IMAGE ==="
          docker pull "$MOBSF_IMAGE" >/dev/null

          echo "=== Starting MobSF ==="
          docker run -d --name mobsf \
            -e MOBSF_API_KEY="$MOBSF_API_KEY" \
            -p 127.0.0.1:8000:8000 \
            "$MOBSF_IMAGE" >/dev/null

          echo "=== Waiting for MobSF API ==="
          # Django startup + first-run DB init can take ~90s on a cold runner.
          READY=0
          for i in $(seq 1 90); do
            if curl -sSf -o /dev/null "http://127.0.0.1:8000/"; then
              echo "MobSF reachable after ${i}s"
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "::error::MobSF did not become reachable within 180s. Last container logs:"
            docker logs --tail 100 mobsf || true
            exit 1
          fi

          echo "=== Uploading APK ==="
          UPLOAD_RESP=$(curl -sSf -X POST \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "file=@${APK}" \
            "http://127.0.0.1:8000/api/v1/upload")
          HASH=$(printf '%s' "$UPLOAD_RESP"    | jq -r '.hash // empty')
          FILENAME=$(printf '%s' "$UPLOAD_RESP"| jq -r '.file_name // empty')
          SCAN_TYPE=$(printf '%s' "$UPLOAD_RESP"| jq -r '.scan_type // empty')
          if [ -z "$HASH" ]; then
            echo "::error::MobSF upload failed. Response:"
            printf '%s\n' "$UPLOAD_RESP" | jq . 2>/dev/null || printf '%s\n' "$UPLOAD_RESP"
            exit 1
          fi
          echo "Uploaded. hash=${HASH:0:12}... scan_type=$SCAN_TYPE"

          echo "=== Running static scan ==="
          # --max-time 600 bounds a runaway scan. An empirical APK scan of our
          # size takes ~2-4 min; 10 min is a generous ceiling.
          curl -sSf --max-time 600 -X POST \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            -F "scan_type=$SCAN_TYPE" \
            -F "file_name=$FILENAME" \
            "http://127.0.0.1:8000/api/v1/scan" > /dev/null

          echo "=== Fetching JSON report ==="
          curl -sSf --max-time 120 -X POST \
            -H "Authorization: $MOBSF_API_KEY" \
            -F "hash=$HASH" \
            "http://127.0.0.1:8000/api/v1/report_json" > mobsf-report.json

          # Structure guard. If MobSF's report shape drifts, fail loudly
          # rather than silently letting findings slip past the gate.
          if ! jq -e '.appsec.high' mobsf-report.json >/dev/null 2>&1; then
            echo "::error::MobSF report missing .appsec.high — upstream schema may have changed. Top-level keys found:"
            jq -r 'keys | .[]' mobsf-report.json || true
            exit 1
          fi

          # Severity summary for log context.
          jq -r '.appsec
            | "MobSF severity summary: high=\(.high|length) warning=\(.warning|length) info=\(.info|length) secure=\(.secure|length) hotspot=\(.hotspot|length)"' \
            mobsf-report.json

          # Extract HIGH-severity titles + apply allowlist.
          mapfile -t HIGH_TITLES < <(jq -r '.appsec.high[]?.title // empty' mobsf-report.json)
          BLOCKING=()
          for title in "${HIGH_TITLES[@]}"; do
            [ -z "$title" ] && continue
            allowed=0
            for allow in "${ALLOWLIST[@]}"; do
              if [[ "$title" == *"$allow"* ]]; then
                allowed=1
                break
              fi
            done
            if [ "$allowed" -eq 0 ]; then
              BLOCKING+=("$title")
            fi
          done

          if [ "${#BLOCKING[@]}" -gt 0 ]; then
            echo "::error::MobSF: ${#BLOCKING[@]} unallowlisted HIGH-severity finding(s) — BLOCKING"
            printf '  - %s\n' "${BLOCKING[@]}"
            echo ""
            echo "Triage:"
            echo "  1. Fix the finding (preferred)."
            echo "  2. If confirmed false positive, add a substring of the title to ALLOWLIST in .github/workflows/build-pilot-apk.yml — justify in the PR description."
            echo "  3. Full report is uploaded as the mobsf-report-* artifact."
            exit 1
          fi

          echo "MobSF gate passed: no unallowlisted HIGH findings."

      - name: Stop MobSF container
        if: always()
        run: docker rm -f mobsf >/dev/null 2>&1 || true

      - name: Sanitize version and rename APKs
        run: |
          # On push events there is no workflow input — fall back to a default.
          VERSION_NAME="${{ inputs.version_name }}"
          VERSION_NAME="${VERSION_NAME:-1.1.0-fieldtasks-pilot}"
          VERSION_SAFE=$(printf '%s' "$VERSION_NAME" | tr -cd '[:alnum:]._-')
          if [ -z "$VERSION_SAFE" ]; then
            echo "::error::version_name contained no allowed characters ([A-Za-z0-9._-])"
            exit 1
          fi
          for abi in $ABIS; do
            cp "build/app/outputs/flutter-apk/app-${abi}-release.apk" \
               "build/app/outputs/flutter-apk/aman-v${VERSION_SAFE}-${abi}.apk"
          done
          ls -lh build/app/outputs/flutter-apk/aman-v*.apk
          echo "VERSION_SAFE=$VERSION_SAFE" >> "$GITHUB_ENV"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aman-pilot-apks-v${{ env.VERSION_SAFE }}
          path: build/app/outputs/flutter-apk/aman-v${{ env.VERSION_SAFE }}-*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload MobSF report
        # Named off github.run_id (not VERSION_SAFE) so the report still
        # uploads when the MobSF step fails before the rename step sets
        # VERSION_SAFE. Triage needs the report most when the gate fails.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-report-${{ github.run_id }}
          path: mobsf-report.json
          retention-days: 30
          if-no-files-found: ignore
